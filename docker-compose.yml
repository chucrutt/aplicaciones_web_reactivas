services:
  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app:Z  # Esto permite que los cambios en VSCode se reflejen sin reiniciar el contenedor
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://api:8000
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app:Z
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data: